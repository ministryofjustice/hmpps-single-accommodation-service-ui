name: Generate Types

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

env:
  NODE_ENV: test

jobs:
  generate-types:
    runs-on: [self-hosted, hmpps-github-actions-runner]
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Generate Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Generate Types
        run: ./script/generate-types ${{ vars.SAS_API_SPEC_URL }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          sign-commits: true
          title: 'API model updates'
          commit-message: 'Updating hmpps-single-accommodation-service-api models from OpenAPI specification'
          body: 'Updating hmpps-single-accommodation-service-api models from OpenAPI specification.  This PR was created automatically from the generate-types.yml Workflow'
          delete-branch: true
          branch: update-api-types
